  <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#080E1C"/>
    <stop offset="100%" stop-color="#0C1628"/>
  </linearGradient>
  <filter id="sh">
    <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#0D1F42" flood-opacity="0.28"/>
  </filter>
  <filter id="shD">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#2E84F0" flood-opacity="0.35"/>
  </filter>
