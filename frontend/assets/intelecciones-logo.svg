<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
<defs>
  <linearGradient id="navy" x1="15%" y1="0%" x2="85%" y2="110%">
    <stop offset="0%" stop-color="#1E3A6E"/>
    <stop offset="100%" stop-color="#0D1F42"/>
  </linearGradient>
  <linearGradient id="navyD" x1="15%" y1="0%" x2="85%" y2="110%">
    <stop offset="0%" stop-color="#2B4F96"/>
    <stop offset="100%" stop-color="#162E60"/>
  </linearGradient>
  <linearGradient id="blueG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2E84F0"/>
    <stop offset="100%" stop-color="#1558B0"/>
